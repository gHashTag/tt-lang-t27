name: publish

# Build the wheel + sdist on every push to main, and publish to PyPI
# when a GitHub Release is created.
#
# Uses PyPI Trusted Publishing (OIDC, no API tokens stored in GitHub).
# One-time setup on pypi.org:
#   Project = tt-lang-t27
#   Owner   = gHashTag
#   Repo    = tt-lang-t27
#   Workflow file = publish.yml
#   Environment = pypi

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to publish (for manual re-runs)"
        required: false
        default: "v0.2.0"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel + sdist
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tt-lang-t27
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
